on: [push]

jobs:
  ClangFormatCheck:
    runs-on: ubuntu-latest
    name: check clang format
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Check clang format
      run: ./.github/automation/clang-format.sh
      shell: bash
  ci_test_job:
    runs-on: ubuntu-latest
    name: Test for xbyak_translator_aarch64
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Test action step
      uses: ./.github/actions/test_action
